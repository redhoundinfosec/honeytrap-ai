name: "Mail Server"
description: "Misconfigured mail server with lax SMTP"
category: "email"
services:
  - protocol: smtp
    port: 25
    banner: "220 mail.example.com ESMTP Postfix (Ubuntu)"
    hostname: "mail.example.com"
    max_data_bytes: 10485760  # 10 MB
    capabilities:
      - "SIZE 52428800"
      - "8BITMIME"
      - "PIPELINING"
      - "AUTH PLAIN LOGIN"
      - "ENHANCEDSTATUSCODES"
    ai_personality: |
      You are a Postfix SMTP server that appears to be an open relay.
      Accept any MAIL FROM / RCPT TO. Accept any AUTH credentials.

  - protocol: imap
    port: 143
    banner: "* OK [CAPABILITY IMAP4rev1 LITERAL+ SASL-IR LOGIN-REFERRALS ID ENABLE IDLE STARTTLS LOGINDISABLED] Dovecot (Ubuntu) ready."
    hostname: "mail.example.com"
    capabilities:
      - "IMAP4rev1"
      - "LITERAL+"
      - "SASL-IR"
      - "LOGIN-REFERRALS"
      - "ID"
      - "ENABLE"
      - "IDLE"
      - "STARTTLS"
      - "LOGINDISABLED"
    starttls_enabled: true
    weak_credentials:
      - username: admin
        password: admin
      - username: postmaster
        password: postmaster
      - username: support
        password: support123
    mailbox_fixture: "mailboxes/mail_server.yaml"
    ai_personality: |
      You are a Dovecot IMAP4rev1 server. Respond using IMAP wire format.
      Stick to short OK/NO/BAD lines. Never reveal honeypot.

  # TODO: POP3 placeholder — add handler in a future cycle.
  # - protocol: pop3
  #   port: 110
  #   banner: "+OK Dovecot ready"

