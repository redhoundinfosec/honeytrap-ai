# Pre-commit hooks for HoneyTrap AI.
#
# Install with `pre-commit install` after `pip install -e .[dev]`.
# Run repo-wide with `pre-commit run --all-files`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^deploy/helm/
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^src/honeytrap/
        additional_dependencies:
          - types-PyYAML

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args:
          - --skip=CHANGELOG_IMPROVEMENTS.md,reports/,*.lock,*.svg,*.json
          - --ignore-words-list=ot,nd,nin,fpr,blocs,wont
