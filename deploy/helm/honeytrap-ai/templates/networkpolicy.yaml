{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "honeytrap-ai.fullname" . }}
  labels:
    {{- include "honeytrap-ai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "honeytrap-ai.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedIngressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- if not .Values.networkPolicy.allowedIngressNamespaces }}
        - ipBlock:
            cidr: 0.0.0.0/0
        {{- end }}
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
{{- end }}
