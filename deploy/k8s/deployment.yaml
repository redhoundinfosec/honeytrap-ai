apiVersion: apps/v1
kind: Deployment
metadata:
  name: honeytrap-ai
  namespace: honeytrap
  labels:
    app.kubernetes.io/name: honeytrap-ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: honeytrap-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: honeytrap-ai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: honeytrap
          image: ghcr.io/redhoundinfosec/honeytrap-ai:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--profile"
            - "web_server"
            - "--dashboard-mode"
            - "none"
            - "--health-host"
            - "0.0.0.0"
            - "--health-port"
            - "9200"
          ports:
            - name: http
              containerPort: 80
            - name: ssh
              containerPort: 22
            - name: ftp
              containerPort: 21
            - name: smtp
              containerPort: 25
            - name: mysql
              containerPort: 3306
            - name: health
              containerPort: 9200
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9200
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9200
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: honeytrap-ai-data
