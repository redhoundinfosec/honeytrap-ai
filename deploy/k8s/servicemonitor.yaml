apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: honeytrap-ai
  namespace: honeytrap
  labels:
    app.kubernetes.io/name: honeytrap-ai
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: honeytrap-ai
  endpoints:
    - port: health
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
