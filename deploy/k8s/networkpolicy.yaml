apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honeytrap-ai
  namespace: honeytrap
  labels:
    app.kubernetes.io/name: honeytrap-ai
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: honeytrap-ai
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
