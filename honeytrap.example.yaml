# honeytrap.yaml — copy this to honeytrap.yaml to override defaults.
general:
  bind_address: "0.0.0.0"
  log_directory: "./honeytrap_logs"
  max_log_size_mb: 500
  log_retention_days: 30
  dashboard: true
  max_concurrent_connections: 500

ai:
  enabled: false
  provider: "openai"        # openai | ollama | custom
  endpoint: ""              # e.g. http://localhost:11434/v1 for Ollama
  api_key: ""               # or export HONEYTRAP_AI_KEY=...
  model: "gpt-4o-mini"
  timeout_seconds: 8.0
  fallback_to_rules: true
  max_tokens: 400
  # Cycle 16 — per-protocol adaptive adapter toggles.
  # Each entry inherits ``adaptive_enabled`` unless explicitly overridden.
  adapters:
    http:
      enabled: true
      max_tokens: 512
      temperature: 0.3
    smtp:
      enabled: true
      max_tokens: 256
      temperature: 0.2
    telnet:
      enabled: true
      max_tokens: 256
      temperature: 0.4
    ftp:
      enabled: true
      max_tokens: 128
      temperature: 0.2
    ssh:
      enabled: true
      max_tokens: 512
      temperature: 0.4

geo:
  enabled: true
  provider: "ip-api"        # ip-api | maxmind
  maxmind_db: ""            # path to GeoLite2-City.mmdb
  vary_responses: true
  cache_size: 4096

reporting:
  auto_report_interval: 3600
  html_export: true
  top_n_attackers: 20
  output_directory: "./honeytrap_reports"

# Per-IP token-bucket rate limiting and concurrent-connection caps.
rate_limiter:
  enabled: true
  max_per_minute: 30        # sustained allowance per source IP
  burst: 10                 # bucket capacity — short bursts allowed
  global_concurrent: 500    # hard cap across all IPs
  per_ip_concurrent: 20     # hard cap from a single IP
  stale_after_seconds: 600  # prune IP buckets idle longer than this
  tarpit_on_limit: false    # if true, slow-respond instead of dropping
  tarpit_seconds: 2.0

# Idle timeouts (seconds). The handler closes the connection when a
# client goes silent longer than the per-protocol limit.
timeouts:
  http_idle: 120.0
  ssh_idle: 300.0
  telnet_idle: 300.0
  ftp_idle: 60.0
  smb_idle: 60.0
  smtp_idle: 300.0
  mysql_idle: 120.0

# Input sanitization — caps on body size, header count, command length.
sanitizer:
  enabled: true
  http_body_max: 1048576       # 1 MB
  other_body_max: 65536        # 64 KB
  http_header_count_max: 100
  http_header_size_max: 8192
  command_max: 4096
  reject_null_bytes: true

# Resource guardian — monitors memory, connections, log disk use.
guardian:
  enabled: true
  memory_limit_mb: 256
  check_interval_seconds: 5.0
  log_dir_warn_mb: 2048

# Alerting subsystem — forwards notifications to Slack, Discord, Teams,
# generic webhooks, and email. All secrets must come from env vars via
# the *_env keys below; never commit raw tokens here.
alerts:
  enabled: false
  min_severity: MEDIUM          # global floor: INFO | LOW | MEDIUM | HIGH | CRITICAL
  dry_run: false                # true = format but do not deliver
  channels:
    # - type: slack
    #   webhook_url_env: HONEYTRAP_SLACK_WEBHOOK_URL
    #   min_severity: HIGH
    #   rate_limit_per_minute: 20
    # - type: discord
    #   webhook_url_env: HONEYTRAP_DISCORD_WEBHOOK_URL
    #   min_severity: HIGH
    #   rate_limit_per_minute: 20
    # - type: teams
    #   webhook_url_env: HONEYTRAP_TEAMS_WEBHOOK_URL
    #   min_severity: HIGH
    #   rate_limit_per_minute: 20
    # - type: webhook
    #   url_env: HONEYTRAP_WEBHOOK_URL
    #   secret_env: HONEYTRAP_WEBHOOK_SECRET
    #   min_severity: MEDIUM
    #   rate_limit_per_minute: 30
    # - type: email
    #   smtp_host: smtp.example.com
    #   smtp_port: 587
    #   starttls: true
    #   username_env: HONEYTRAP_SMTP_USER
    #   password_env: HONEYTRAP_SMTP_PASS
    #   from_addr: honeytrap@example.com
    #   to_addrs: [soc@example.com]
    #   min_severity: HIGH
    #   rate_limit_per_minute: 5


# Multi-node cluster (Cycle 15).
#
# Disabled by default. When enabled, the binary takes one of three
# roles: `node` (sensor that forwards events), `controller` (central
# management plane), or `mixed` (both, for single-host setups).
#
# A node-role API key is htk_-prefixed and limited by RBAC to the
# register, heartbeat, and event-ingest endpoints. Generate one on the
# controller with: `honeytrap api-keys create --role node --name edge-01`.
cluster:
  enabled: false
  role: node                                  # node | controller | mixed
  # node_id: edge-01                          # stable identifier (optional)
  controller_url: http://controller.local:9300
  api_key: htk_REPLACE_ME
  heartbeat_interval: 30                      # seconds
  event_batch_size: 200                       # max events per POST
  event_flush_interval: 5                     # seconds between flushes
  tls_verify: true                            # honour controller TLS chain
  spool_max_events: 10000                     # in-memory + disk overflow cap
  spool_max_disk_bytes: 67108864              # 64 MiB on-disk overflow cap
  tags:
    - edge
    # - us-east-1
