<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; padding: 60px; }
        .wrap { max-width: 360px; margin: 0 auto; background: #fff; padding: 24px; border: 1px solid #ddd; }
        input { width: 100%; padding: 6px; margin: 6px 0; }
        button { padding: 8px 16px; background: #444; color: #fff; border: 0; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>{{ personality.company if personality else 'Admin' }} · Sign in</h2>
        <form method="post" action="/admin/login">
            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
