<!DOCTYPE html>
<html>
<head>
    <title>Index of {{ path }}</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        h1 { font-size: 18px; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; }
        th, td { padding: 4px 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f6f6f6; }
    </style>
</head>
<body>
    <h1>Index of {{ path }}</h1>
    <table>
        <tr><th>Name</th><th>Last Modified</th><th>Size</th></tr>
        <tr><td><a href="../">Parent Directory</a></td><td>-</td><td>-</td></tr>
        {% for entry in (personality.sample_file_names if personality else []) %}
            <tr>
                <td><a href="{{ entry }}">{{ entry }}</a></td>
                <td>2026-04-19 12:34</td>
                <td>1.2K</td>
            </tr>
        {% endfor %}
    </table>
    <hr>
    <p>Apache/2.4.49 (Ubuntu) Server</p>
</body>
</html>
