    "src/honeytrap/sinks/file_jsonl.py",
    "src/honeytrap/sinks/sink_base.py",
    "src/honeytrap/sinks/__init__.py",
    "src/honeytrap/reporting/charts.py",
    "src/honeytrap/reporting/analyzer.py",
    "src/honeytrap/protocols/tls_peek.py",
    "src/honeytrap/api/openapi.py",
    "src/honeytrap/api/taxii.py",
    "src/honeytrap/api/rate_limit.py",
    "src/honeytrap/api/router.py",
    "src/honeytrap/logging/database.py",
    "src/honeytrap/intel/stix/mapping.py",
    "src/honeytrap/api/config.py",
    "src/honeytrap/api/errors.py",
    "src/honeytrap/api/rbac.py",
]

[tool.coverage.report]
fail_under = 90
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@(abc\\.)?abstractmethod",
    "if __name__ == .__main__.:",
]

# --- mypy per-module overrides ---
# These 32 modules predate strict typing; each is a TODO for Cycle 15+.
